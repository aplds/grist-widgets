<div style="
    display: flex;
    align-items: center;
    background-color: #ffffff;
    padding: 12px;
    border-radius: 4px;
    font-family: Marianne, Arial, sans-serif;
    height: 90px;
    box-sizing: border-box;
    width: 100%;
">
    <!-- Conteneur pour le logo et le titre (accolés) -->
    <div style="
        display: flex;
        align-items: center;
        height: 100%;
        margin-right: auto;  /* Pousse les boutons vers la droite */
    ">
        <!-- Logo -->
        <img
            src="https://www.institut-agro.fr/files/fichiers/bibliotheque-de-documents/institutionnel/charte-graphique/logos/logo-institut-agro-couleur-300dpi.png"
            alt="Logo Institut Agro"
            style="height: 90px; width: auto;"
        />

        <!-- Titre accolé au logo avec marge personnalisable -->
        <div
            id="menuTitle"
            style="
                font-weight: bold;
                font-family: Marianne, Arial, sans-serif;
                font-size: 48px;
                margin-left: 24px;  /* Marge personnalisable entre le logo et le titre */
                display: flex;
                align-items: center;
                height: 100%;
            "
        ></div>
    </div>

    <!-- Conteneur des boutons à droite -->
    <div
        id="menuContainer"
        style="
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            height: 100%;
            justify-content: flex-end;
        "
    ></div>
</div>
