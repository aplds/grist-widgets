<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Menu GRIST</title>
    <!-- Police Marianne -->
    <link href="https://fonts.googleapis.com/css2?family=Marianne:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        /* Style pour les boutons (optionnel, peut être déplacé dans le JS) */
        .menu-button {
            margin: 0 8px 8px 0;
            padding: 12px 24px;
            background-color: #000091;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-family: Marianne, Arial, sans-serif;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .menu-button:hover {
            background-color: #1e1e5e;
        }
    </style>
</head>
<body>
    <!-- Conteneur principal du widget -->
    <div style="
        display: flex;
        align-items: center;
        background-color: #ffffff;
        padding: 12px;
        border-radius: 4px;
        font-family: Marianne, Arial, sans-serif;
        height: 90px;
        box-sizing: border-box;
        width: 100%;
    ">
        <!-- Conteneur pour le logo et le titre -->
        <div style="
            display: flex;
            align-items: center;
            height: 100%;
            margin-right: auto;
        ">
            <!-- Logo -->
            <img
                src="https://www.institut-agro.fr/files/fichiers/bibliotheque-de-documents/institutionnel/charte-graphique/logos/logo-institut-agro-couleur-300dpi.png"
                alt="Logo Institut Agro"
                style="height: 90px; width: auto;"
            />
            <!-- Titre -->
            <div
                id="menuTitle"
                style="
                    font-weight: bold;
                    font-family: Marianne, Arial, sans-serif;
                    font-size: 48px;
                    margin-left: 24px;
                    display: flex;
                    align-items: center;
                    height: 100%;
                "
            ></div>
        </div>
        <!-- Conteneur des boutons -->
        <div
            id="menuContainer"
            style="
                display: flex;
                gap: 8px;
                align-items: center;
                flex-wrap: wrap;
                height: 100%;
                justify-content: flex-end;
            "
        ></div>
    </div>

    <!-- Dépendances nécessaires pour GRIST (optionnelles pour GitHub Pages) -->
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/dompurify@3/dist/purify.min.js"></script>

    <!-- Script personnalisé (assurez-vous que le chemin est correct) -->
    <script src="script.js"></script>
</body>
</html>
