<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Affaires Disciplinaires</title>
    <!-- Polices Marianne -->
    <link href="https://fonts.googleapis.com/css2?family=Marianne:wght@400;700&display=swap" rel="stylesheet">
    <!-- DSFR CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.9.3/dist/dsfr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.9.3/dist/utility/utility.min.css">
    <!-- Nos styles -->
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <!-- En-tête DSFR conforme -->
    <header role="banner" class="fr-header">
        <div class="fr-header__body">
            <div class="fr-container">
                <div class="fr-header__body-row">
                    <div class="fr-header__brand fr-enlarge-link">
                        <div class="fr-header__logo">
                            <p class="fr-logo" title="République française">
                                République
                                <br>française
                            </p>
                        </div>
                        <div class="fr-header__operator">
                            <img src="https://www.institut-agro.fr/files/fichiers/bibliotheque-de-documents/institutionnel/charte-graphique/logos/logo-institut-agro-couleur-300dpi.png"
                                 alt="Institut Agro"
                                 class="fr-responsive-img custom-institut-logo">
                        </div>
                    </div>
                    <div class="fr-header__service">
                        <a href="/" title="Accueil - Gestion des affaires disciplinaires">
                            <p class="fr-header__service-title">
                                Gestion des affaires disciplinaires
                            </p>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Contenu principal -->
    <main id="app-content" class="fr-container fr-py-4w">
        <div class="fr-grid-row fr-grid-row--gutters">
            <div class="fr-col-12">
                <h1 class="fr-h3">Liste des affaires disciplinaires</h1>

                <!-- Filtres -->
                <div class="fr-grid-row fr-grid-row--gutters fr-mb-3w">
                    <div class="fr-col-md-4 fr-col-12">
                        <div class="fr-input-group">
                            <label class="fr-label" for="searchInput">Rechercher</label>
                            <input class="fr-input" id="searchInput" type="text" placeholder="Numéro ou mis en cause">
                        </div>
                    </div>
                    <div class="fr-col-md-3 fr-col-12">
                        <div class="fr-select-group">
                            <label class="fr-label" for="filterEtat">État</label>
                            <select class="fr-select" id="filterEtat">
                                <option value="">Tous les états</option>
                            </select>
                        </div>
                    </div>
                    <div class="fr-col-md-3 fr-col-12">
                        <div class="fr-select-group">
                            <label class="fr-label" for="filterEcole">École</label>
                            <select class="fr-select" id="filterEcole">
                                <option value="">Toutes les écoles</option>
                            </select>
                        </div>
                    </div>
                    <div class="fr-col-md-2 fr-col-12">
                        <div class="fr-select-group">
                            <label class="fr-label" for="itemsPerPage">Affaires par page</label>
                            <select class="fr-select" id="itemsPerPage">
                                <option value="10">10</option>
                                <option value="25">25</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Tableau des affaires -->
                <div class="fr-table fr-table--layout-fixed">
                    <table>
                        <thead>
                            <tr>
                                <th>Numéro <span class="sort-icon" data-column="Numero">↕</span></th>
                                <th>État <span class="sort-icon" data-column="Etat">↕</span></th>
                                <th>Date <span class="sort-icon" data-column="Date">↕</span></th>
                                <th>École <span class="sort-icon" data-column="Ecole">↕</span></th>
                                <th>Mis en cause <span class="sort-icon" data-column="Mis en cause">↕</span></th>
                            </tr>
                        </thead>
                        <tbody id="affairesTableBody">
                            <!-- Le contenu sera généré par JavaScript -->
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="fr-grid-row fr-grid-row--gutters fr-mt-3w">
                    <div class="fr-col-6">
                        <span id="paginationInfo">Page 1 sur 1 | 0 affaire(s)</span>
                    </div>
                    <div class="fr-col-6" style="text-align: right;">
                        <button class="fr-btn fr-btn--secondary" id="prevPage" disabled>Précédent</button>
                        <button class="fr-btn fr-btn--secondary" id="nextPage" disabled>Suivant</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Pied de page -->
    <footer class="fr-footer">
        <div class="fr-container">
            <div class="fr-footer__body">
                <div class="fr-footer__brand fr-enlarge-link">
                    <a href="/" title="Retour à l'accueil">
                        <p class="fr-logo">
                            République
                            <br>française
                        </p>
                    </a>
                </div>
                <div class="fr-footer__content">
                    <p class="fr-footer__content-desc">Institut Agro - Application de gestion des affaires disciplinaires</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Scripts DSFR -->
    <script src="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.9.3/dist/dsfr.min.js"></script>
    <!-- Nos scripts -->
    <script src="scripts/grist-init.js"></script>
    <script src="scripts/affaires.js"></script>
    <script src="scripts/main.js"></script>
</body>
</html>
