<body class="fr-container">
    <!-- En-tête DSFR conforme -->

        <div class="fr-header__body">
            <div class="fr-container">
                <div class="fr-header__body-row">

                                 alt="Institut Agro"
                                 class="fr-responsive-img">
                        </div>
                    </div>
                    <div class="fr-header__service">
                        <a href="/" title="Accueil - Gestion des affaires disciplinaires">
                            <p class="fr-header__service-title">
                                Gestion des affaires disciplinaires
                            </p>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <div class="fr-header__menu fr-modal" id="header-navigation">
            <div class="fr-container">
                <button class="fr-btn--close fr-btn" aria-controls="header-navigation">Fermer</button>
                <div class="fr-header__menu-links">
                    <ul class="fr-nav__list">
                        <li class="fr-nav__item">
                            <a class="fr-nav__link active" href="#" data-page="home" id="nav-home">Accueil</a>
                        </li>
                        <li class="fr-nav__item">
                            <a class="fr-nav__link" href="#" data-page="members" id="nav-members">Membres</a>

                            <a class="fr-nav__link" href="#" data-page="hearings" id="nav-hearings">Audiences</a>
                        </li>
                        <li class="fr-nav__item">
                            <a class="fr-nav__link" href="#" data-page="templates" id="nav-templates">Modèles</a>

                    </ul>
                </div>
            </div>
        </div>
    </header>

    <!-- Contenu principal -->
    <main id="app-content" class="fr-container fr-py-6w">
        <!-- Contenu chargé dynamiquement -->
    </main>

    <!-- Pied de page -->

        <div class="fr-container">
            <div class="fr-footer__body">
                <div class="fr-footer__brand fr-enlarge-link">
                    <a href="/" title="Retour à l'accueil - République Française">

                            <br>française
                        </p>
                    </a>
                </div>
                <div class="fr-footer__content">
                    <p class="fr-footer__content-desc">Institut Agro - Application de gestion des affaires disciplinaires</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Scripts DSFR -->
    <script src="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.9.3/dist/dsfr.min.js"></script>
    <!-- Scripts -->
    <script>
        // Initialisation de l'API Grist pour les widgets
        document.addEventListener('DOMContentLoaded', function() {
            // Dans un widget Grist, l'API est disponible globalement
            window.GristAPI = {
                /**
                 * Récupère toutes les lignes d'une table
                 */
                fetchTable: function(tableName) {
                    return grist.docApi.fetchTable(tableName);
                },

                /**
                 * Récupère un enregistrement spécifique
                 */
                fetchRecord: function(tableName, recordId) {
                    return grist.docApi.fetchSelectedRecord(tableName, recordId);
                },

                /**
                 * Récupère les enregistrements liés
                 */
                fetchRelatedRecords: function(tableName, foreignKey, foreignKeyValue) {
                    return grist.docApi.fetchTable(tableName, {
                        filter: { [foreignKey]: foreignKeyValue }
                    });
                },

                /**
                 * Ajoute un nouvel enregistrement
                 */
                addRecord: function(tableName, data) {
                    return grist.docApi.addRecord(tableName, data);
                },

                /**
                 * Met à jour un enregistrement
                 */
                updateRecord: function(tableName, recordId, data) {
                    return grist.docApi.updateRecord(tableName, recordId, data);
                }
            };

            // Initialisation du DSFR
            if (window.dsfr) {
                window.dsfr.start();
            }
        });
    </script>
    <script src="scripts/main.js"></script>
    <script src="scripts/home.js"></script>
</body>
