<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Disciplinaire</title>
    <!-- Polices Marianne -->
    <link href="https://fonts.googleapis.com/css2?family=Marianne:wght@400;700&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <img src="https://www.institut-agro.fr/files/fichiers/bibliotheque-de-documents/institutionnel/charte-graphique/logos/logo-institut-agro-couleur-300dpi.png"
                 alt="Institut Agro Logo"
                 class="header-logo">
            <h1 class="header-title">Gestion des Affaires Disciplinaires</h1>
        </header>

        <!-- Navigation -->
        <nav class="app-nav">
            <button class="nav-button active" data-page="home">Accueil</button>
            <button class="nav-button" data-page="members">Membres</button>
            <button class="nav-button" data-page="hearings">Audiences</button>
            <button class="nav-button" data-page="templates">Modèles</button>
        </nav>

        <!-- Main Content -->
        <main class="app-main" id="app-content">
            <!-- Content loaded dynamically -->
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>© Institut Agro - <span id="current-year"></span></p>
        </footer>
    </div>

    <!-- Grist API -->
    <script src="https://cdn.jsdelivr.net/npm/@grist-labs/api@0.4.0/dist/grist-api.js"></script>
    <!-- App Scripts -->
    <script src="scripts/api.js"></script>
    <script src="scripts/main.js"></script>
    <script src="scripts/home.js"></script>
    <script>
        // Set current year in footer
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
