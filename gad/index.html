<div class="widget-container">
    <!-- En-tête avec logo et titre -->
    <div class="header">
        <div class="logo">
            <img src="https://upload.wikimedia.org/wikipedia/fr/thumb/2/22/Republique-francaise-logo.svg/500px-Republique-francaise-logo.svg.png" alt="République Française" />
        </div>
        <h1>Gestion des affaires disciplinaires</h1>
    </div>

    <!-- Barre de recherche -->
    <div class="search-bar">
        <input type="text" id="search-input" placeholder="Rechercher une affaire..." />
        <button class="fr-btn" id="search-button">Rechercher</button>
    </div>

    <!-- Tableau des affaires -->
    <div class="affaires-table">
        <table id="affaires-list">
            <thead>
                <tr>
                    <th>Mis en cause</th>
                    <th>École</th>
                    <th>État</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Modale pour les détails d'une affaire -->
    <div id="affaire-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-title">Détails de l'affaire</h2>
            <div id="modal-details"></div>
            <div class="tabs">
                <button class="tab-button active" data-tab="membres">Membres</button>
                <button class="tab-button" data-tab="courriers">Courriers</button>
                <button class="tab-button" data-tab="jugements">Jugements</button>
                <button class="tab-button" data-tab="rapports">Rapports</button>
                <button class="tab-button" data-tab="decisions">Décisions</button>
            </div>
            <div class="tab-content" id="membres-tab">
                <!-- Contenu des membres -->
            </div>
            <div class="tab-content" id="courriers-tab">
                <!-- Contenu des courriers -->
            </div>
            <div class="tab-content" id="jugements-tab">
                <!-- Contenu des jugements -->
            </div>
            <div class="tab-content" id="rapports-tab">
                <!-- Contenu des rapports -->
            </div>
            <div class="tab-content" id="decisions-tab">
                <!-- Contenu des décisions -->
            </div>
        </div>
    </div>
</div>
