<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Affaires Disciplinaires</title>
    <!-- Polices Marianne -->
    <link href="https://fonts.googleapis.com/css2?family=Marianne:wght@400;700&display=swap" rel="stylesheet">
    <!-- DSFR CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.9.3/dist/dsfr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.9.3/dist/utility/utility.min.css">
    <!-- Nos styles -->
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <!-- En-tête DSFR conforme -->
    <header role="banner" class="fr-header">
        <div class="fr-header__body">
            <div class="fr-container">
                <div class="fr-header__body-row">
                    <div class="fr-header__brand fr-enlarge-link">
                        <div class="fr-header__logo">
                            <p class="fr-logo" title="République française">
                                République
                                <br>française
                            </p>
                        </div>
                        <div class="fr-header__operator">
                            <img src="https://www.institut-agro.fr/files/fichiers/bibliotheque-de-documents/institutionnel/charte-graphique/logos/logo-institut-agro-couleur-300dpi.png"
                                 alt="Institut Agro"
                                 style="height: 4rem; width: auto; margin-left: 1rem;">
                        </div>
                    </div>
                    <div class="fr-header__service">
                        <a href="/" title="Accueil - Gestion des affaires disciplinaires">
                            <p class="fr-header__service-title">
                                Gestion des affaires disciplinaires
                            </p>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Contenu principal -->
    <main id="app-content" class="fr-container fr-py-4w">
        <div class="fr-grid-row fr-grid-row--gutters">
            <div class="fr-col-12">
                <h1 class="fr-h3">Liste des affaires disciplinaires</h1>
                <div id="affaires-container">
                    <div class="fr-callout fr-callout--info">
                        Chargement des affaires en cours...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Pied de page -->
    <footer class="fr-footer">
        <div class="fr-container">
            <div class="fr-footer__body">
                <div class="fr-footer__brand fr-enlarge-link">
                    <a href="/" title="Retour à l'accueil">
                        <p class="fr-logo">
                            République
                            <br>française
                        </p>
                    </a>
                </div>
                <div class="fr-footer__content">
                    <p class="fr-footer__content-desc">Institut Agro - Application de gestion des affaires disciplinaires</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Scripts DSFR -->
    <script src="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.9.3/dist/dsfr.min.js"></script>
    <!-- Script principal avec initialisation Grist -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialiser le DSFR
            if (window.dsfr) {
                window.dsfr.start();
            }

            // Initialisation de l'API Grist pour les widgets
            grist.ready({
                requiredAccess: 'read table'
            });

            // Variable pour stocker les affaires
            let affaires = [];

            // Écouteur pour les changements de sélection
            grist.on('record', function(record) {
                console.log("Record reçu:", record);
            });

            // Écouteur pour les changements de table
            grist.on('message', function(msg) {
                if (msg.type === 'table') {
                    affaires = msg.selectedTable;
                    renderAffaires();
                }
            });

            // Fonction pour afficher les affaires
            function renderAffaires() {
                const container = document.getElementById('affaires-container');

                if (!affaires || affaires.length === 0) {
                    container.innerHTML = `
                        <div class="fr-callout fr-callout--info">
                            <h3 class="fr-callout__title">Aucune affaire trouvée</h3>
                            <p class="fr-callout__text">Il n'y a actuellement aucune affaire enregistrée.</p>
                        </div>
                    `;
                    return;
                }

                // Afficher les données brutes pour débogage
                console.log("Affaires reçues:", affaires);

                // Vérifier la structure des données
                const sample = affaires[0];
                const columns = Object.keys(sample || {});

                container.innerHTML = `
                    <div class="fr-table fr-table--layout-fixed">
                        <table>
                            <thead>
                                <tr>
                                    ${columns.map(col => `<th>${col}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>
                                ${affaires.map(affaire => `
                                    <tr>
                                        ${columns.map(col => {
                                            const value = affaire[col];
                                            if (col.toLowerCase().includes('date') && value) {
                                                try {
                                                    return `<td>${new Date(value).toLocaleDateString('fr-FR')}</td>`;
                                                } catch {
                                                    return `<td>${value}</td>`;
                                                }
                                            }
                                            return `<td>${value || 'N/A'}</td>`;
                                        }).join('')}
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }

            // Fonction pour déterminer la classe du badge
            function getBadgeClass(status) {
                if (!status) return "fr-badge--info";

                const classes = {
                    "pré-enregistrée": "fr-badge--info",
                    "en instruction": "fr-badge--warning",
                    "clôturée": "fr-badge--success",
                    "annulée": "fr-badge--error"
                };

                return classes[status.toLowerCase()] || "fr-badge--info";
            }

            // Charger les données initiales
            grist.docApi.fetchSelectedTable().then(function(data) {
                affaires = data;
                renderAffaires();
            }).catch(function(error) {
                console.error("Erreur lors du chargement initial:", error);
                document.getElementById('affaires-container').innerHTML = `
                    <div class="fr-callout fr-callout--error">
                        <h3 class="fr-callout__title">Erreur de chargement</h3>
                        <p class="fr-callout__text">Impossible de charger les affaires: ${error.message}</p>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
